<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BVSHOP 出貨明細列印</title>
  <script type="module" src="../src/print/main.tsx"></script>
  <style>
    @media screen {
      body { font-family: system-ui, sans-serif; margin: 16px; background: #f5f5f5; }
      .loading { text-align: center; padding: 40px; color: #555; font-size: 16px; }
      .print-preview { background: #fff; padding: 16px; margin: 0 auto; max-width: 800px; }
      .actions { text-align: center; margin: 16px 0; }
      .actions button {
        padding: 10px 24px; background: #2962ff; color: #fff;
        border: none; border-radius: 6px; font-size: 15px;
        cursor: pointer; font-weight: 700; margin: 0 8px;
      }
      .actions button:hover { background: #1a45c7; }
      .actions .btn-close { background: #757575; }
    }
    @media print {
      .actions, .loading-screen { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
